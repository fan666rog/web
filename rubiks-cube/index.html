<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rubik's Cube</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
        }
        canvas {
            display: block;
            touch-action: none; /* 關鍵修正：防止手機瀏覽器觸控時觸發上下捲動或重新整理 */
        }
        #controls-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            width: 90%; 
            max-width: 400px;
            gap: 10px;
        }

        .button-row {
            display: flex;
            gap: 10px;
        }

        #controls-container button {
            flex: 1;
            padding: 10px 5px;
            font-size: 16px;
            font-family: '微軟正黑體', sans-serif;
            background-color: rgba(30, 30, 30, 0.7);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            white-space: nowrap; 
        }
        #controls-container button:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
        #controls-container button:active {
            transform: scale(0.95);
        }
        #controls-container button:disabled {
            background-color: rgba(50, 50, 50, 0.5);
            color: #888;
            cursor: not-allowed;
        }

        /* 頁尾樣式 */
        footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-family: sans-serif;
            font-size: 14px;
            z-index: 100;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }

        footer a {
            color: #fff;
            text-decoration: none;
            pointer-events: auto;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Gizmo 樣式 */
        #gizmo-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            z-index: 101;
            pointer-events: none;
        }

        #gizmo-container canvas {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="controls-container">
        <div class="button-row">
            <button id="scramble-btn">打亂</button>
            <button id="reset-btn">重置</button>
            <button id="undo-btn">上一步</button>
        </div>
        <div class="button-row">
            <button id="reset-view-btn">視角回正</button>
            <button id="invert-view-btn">上下顛倒</button>
            <button id="rotate-view-btn">右側當底</button>
        </div>
    </div>

    <div id="gizmo-container"></div>

    <footer>
        <p>&copy; <span id="copyright-year"></span> <a href="https://github.com/fan666rog/web" target="_blank">fan666rog</a> & Gemini. All Rights Reserved. V2.5</p>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);
        camera.lookAt(scene.position);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 控制項 ---
        const controls = new TrackballControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);
        controls.noRotate = false;
        controls.noPan = true;
        controls.noZoom = true;
        controls.staticMoving = true;
        controls.dynamicDampingFactor = 0.2;
        controls.rotateSpeed = 3.0;
        
        // 永遠保持開啟，避免 Three.js 內部遺失 pointerup 事件產生幽靈指標
        controls.enabled = true; 

        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN, 
            MIDDLE: THREE.MOUSE.ZOOM,
            RIGHT: THREE.MOUSE.ROTATE
        };

        // --- Gizmo 設定 ---
        let gizmoRenderer, labelRenderer, gizmoScene, gizmoCamera, gizmo, gizmoRaycaster;

        function initGizmo() {
            const gizmoContainer = document.getElementById('gizmo-container');
            if (!gizmoContainer) return;

            gizmoRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            gizmoRenderer.setSize(gizmoContainer.clientWidth, gizmoContainer.clientHeight);
            gizmoRenderer.setClearAlpha(0);
            gizmoContainer.appendChild(gizmoRenderer.domElement);

            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(gizmoContainer.clientWidth, gizmoContainer.clientHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            gizmoContainer.appendChild(labelRenderer.domElement);
            
            gizmoScene = new THREE.Scene();
            gizmoScene.add(new THREE.AmbientLight(0xffffff, 3.0));

            const aspect = gizmoContainer.clientWidth / gizmoContainer.clientHeight;
            gizmoCamera = new THREE.PerspectiveCamera(60, aspect, 0.1, 100);
            gizmoCamera.position.set(0, 0, 3.5);
            gizmoCamera.lookAt(0, 0, 0);
            
            gizmo = new THREE.Group();
            gizmoScene.add(gizmo);

            const axisLength = 1;
            const axes = [
                { dir: new THREE.Vector3(1, 0, 0), color: 0xff0000, name: 'X' },
                { dir: new THREE.Vector3(-1, 0, 0), color: 0x880000, name: '-X' },
                { dir: new THREE.Vector3(0, 1, 0), color: 0x00ff00, name: 'Y' },
                { dir: new THREE.Vector3(0, -1, 0), color: 0x008800, name: '-Y' },
                { dir: new THREE.Vector3(0, 0, 1), color: 0x0000ff, name: 'Z' },
                { dir: new THREE.Vector3(0, 0, -1), color: 0x000088, name: '-Z' }
            ];

            axes.forEach(axisInfo => {
                const isPositive = !axisInfo.name.startsWith('-');
                if (isPositive) {
                    const arrow = new THREE.ArrowHelper(axisInfo.dir, new THREE.Vector3(0,0,0), axisLength, axisInfo.color, 0.2, 0.15);
                    gizmo.add(arrow);
                } else {
                    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), new THREE.MeshBasicMaterial({ color: axisInfo.color }));
                    dot.position.copy(axisInfo.dir).multiplyScalar(axisLength);
                    gizmo.add(dot);
                }

                const labelDiv = document.createElement('div');
                labelDiv.textContent = axisInfo.name;
                labelDiv.style.color = `#${axisInfo.color.toString(16).padStart(6, '0')}`;
                labelDiv.style.fontFamily = 'monospace';
                labelDiv.style.fontSize = '14px';
                labelDiv.style.fontWeight = 'bold';
                labelDiv.style.textShadow = '0 0 3px #000';
                labelDiv.style.pointerEvents = 'none';
                const label = new CSS2DObject(labelDiv);
                label.position.copy(axisInfo.dir).multiplyScalar(axisLength * 1.25);
                gizmo.add(label);

                let hitbox = new THREE.Mesh(
                    isPositive ? new THREE.CylinderGeometry(0.15, 0.15, axisLength, 8) : new THREE.SphereGeometry(0.18, 16, 16),
                    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0.0 })
                );
                if (isPositive) {
                    hitbox.position.copy(axisInfo.dir).multiplyScalar(axisLength / 2);
                    hitbox.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), axisInfo.dir.clone().normalize());
                } else {
                    hitbox.position.copy(axisInfo.dir).multiplyScalar(axisLength);
                }
                hitbox.name = axisInfo.name;
                gizmo.add(hitbox);
            });
            
            gizmoRaycaster = new THREE.Raycaster();
            gizmoRenderer.domElement.addEventListener('pointerdown', onGizmoClick);
        }

        function onGizmoClick(event) {
            if (isAnimating) return;
            const gizmoBounds = gizmoRenderer.domElement.getBoundingClientRect();
            const gizmoMouse = new THREE.Vector2();
            gizmoMouse.x = ((event.clientX - gizmoBounds.left) / gizmoBounds.width) * 2 - 1;
            gizmoMouse.y = -((event.clientY - gizmoBounds.top) / gizmoBounds.height) * 2 + 1;
            
            gizmoRaycaster.setFromCamera(gizmoMouse, gizmoCamera);
            const intersects = gizmoRaycaster.intersectObjects(gizmo.children, true);
            if (intersects.length > 0) {
                const hit = intersects.find(i => i.object.name);
                if (hit) snapCameraToView(hit.object.name);
            }
        }

        let cameraAnimationId = null;
        function animateCamera(targetPosition, targetUp) {
            if (cameraAnimationId) cancelAnimationFrame(cameraAnimationId);
            setControlsEnabled(false);

            const startPosition = camera.position.clone();
            const startUp = camera.up.clone();
            const duration = 500, startTime = performance.now();

            let n1 = startPosition.clone().normalize(), n2 = targetPosition.clone().normalize();
            let pDot = n1.dot(n2);
            let posAxis = new THREE.Vector3(), posMaxAngle = Math.acos(Math.max(-1, Math.min(1, pDot)));

            if (Math.abs(pDot + 1) < 0.001) { 
                posAxis.set(0, 1, 0); 
                if (Math.abs(n1.y) > 0.9) posAxis.set(1, 0, 0); 
                posAxis.projectOnPlane(n1).normalize();
            } else {
                posAxis.crossVectors(n1, n2).normalize();
            }

            let u1 = startUp.clone().normalize(), u2 = targetUp.clone().normalize();
            let uDot = u1.dot(u2);
            let upAxis = new THREE.Vector3(), upMaxAngle = Math.acos(Math.max(-1, Math.min(1, uDot)));

            if (Math.abs(uDot + 1) < 0.001) upAxis.copy(startPosition).normalize().negate();
            else upAxis.crossVectors(u1, u2).normalize();

            function animate() {
                const t = Math.min(1, (performance.now() - startTime) / duration);
                const easedT = 0.5 * (1 - Math.cos(t * Math.PI)); 

                if (posMaxAngle > 0) camera.position.copy(startPosition).applyAxisAngle(posAxis, posMaxAngle * easedT);
                else camera.position.copy(targetPosition);

                if (upMaxAngle > 0) camera.up.copy(startUp).applyAxisAngle(upAxis, upMaxAngle * easedT).normalize();
                else camera.up.copy(targetUp).normalize();

                camera.lookAt(0, 0, 0);
                camera.updateMatrixWorld();

                if (t < 1) {
                    cameraAnimationId = requestAnimationFrame(animate);
                } else {
                    camera.position.copy(targetPosition);
                    camera.up.copy(targetUp).normalize();
                    camera.lookAt(0, 0, 0);
                    camera.updateMatrixWorld();
                    controls.update(); 
                    cameraAnimationId = null;
                    setControlsEnabled(true);
                }
            }
            animate();
        }

        function snapCameraToView(axis) {
            const distance = camera.position.length();
            let position, up;
            switch (axis) {
                case 'X': position = new THREE.Vector3(distance, 0, 0); up = new THREE.Vector3(0, 1, 0); break;
                case '-X': position = new THREE.Vector3(-distance, 0, 0); up = new THREE.Vector3(0, 1, 0); break;
                case 'Y': position = new THREE.Vector3(0, distance, 0); up = new THREE.Vector3(0, 0, -1); break;
                case '-Y': position = new THREE.Vector3(0, -distance, 0); up = new THREE.Vector3(0, 0, 1); break;
                case 'Z': position = new THREE.Vector3(0, 0, distance); up = new THREE.Vector3(0, 1, 0); break;
                case '-Z': position = new THREE.Vector3(0, 0, -distance); up = new THREE.Vector3(0, 1, 0); break;
            }
            if (position) animateCamera(position, up);
        }

        // --- UI & 光源 & 方塊初始化 ---
        const scrambleBtn = document.getElementById('scramble-btn');
        const resetBtn = document.getElementById('reset-btn');
        const undoBtn = document.getElementById('undo-btn');
        const resetViewBtn = document.getElementById('reset-view-btn');
        const invertViewBtn = document.getElementById('invert-view-btn');
        const rotateViewBtn = document.getElementById('rotate-view-btn');

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        const rubiksCube = new THREE.Group();
        const CUBIE_SIZE = 1, CUBIE_GAP = 0.1, positionOffset = CUBIE_SIZE + CUBIE_GAP;

        const insideMaterial = new THREE.ShaderMaterial({
            side: THREE.DoubleSide,
            uniforms: { u_time: { value: 0.0 } },
            vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragmentShader: `
                uniform float u_time; varying vec2 vUv;
                float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898, 78.233))) * 43758.5453123); }
                float noise(vec2 st) {
                    vec2 i = floor(st), f = fract(st);
                    float a = random(i), b = random(i + vec2(1.0, 0.0)), c = random(i + vec2(0.0, 1.0)), d = random(i + vec2(1.0, 1.0));
                    vec2 u = f * f * (3.0 - 2.0 * f);
                    return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.y * u.x;
                }
                void main() {
                    vec2 st = vUv * 5.0; st.x += u_time * 0.4;
                    float n = noise(st * vec2(1.0, 3.0) + vec2(0.0, u_time * 0.8));
                    float intensity = pow(n, 20.0);
                    vec3 finalColor = mix(vec3(0.1, 0.0, 0.3), vec3(0.8, 0.5, 1.0), intensity);
                    finalColor *= 0.5 + ((sin(u_time * 3.0) * 0.5 + 0.5) * intensity * 1.5);
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        });

        const materials = {
            right: new THREE.MeshStandardMaterial({ color: 0xff0000 }), left: new THREE.MeshStandardMaterial({ color: 0xffa500 }), 
            top: new THREE.MeshStandardMaterial({ color: 0xffffff }), bottom: new THREE.MeshStandardMaterial({ color: 0xffff00 }), 
            front: new THREE.MeshStandardMaterial({ color: 0x0000ff }), back: new THREE.MeshStandardMaterial({ color: 0x008000 }), inside: insideMaterial 
        };

        const cubies = [];
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    if (x === 0 && y === 0 && z === 0) continue;
                    const cubie = new THREE.Mesh(new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE), [
                        x === 1 ? materials.right : materials.inside, x === -1 ? materials.left : materials.inside,
                        y === 1 ? materials.top : materials.inside, y === -1 ? materials.bottom : materials.inside,
                        z === 1 ? materials.front : materials.inside, z === -1 ? materials.back : materials.inside
                    ]);
                    cubie.position.set(x * positionOffset, y * positionOffset, z * positionOffset);
                    rubiksCube.add(cubie);
                    cubies.push(cubie);
                }
            }
        }
        scene.add(rubiksCube);

        // --- 核心互動修正區 ---
        let moveHistory = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedCubie = null, selectedFaceNormal = null, isDragging = false, dragStartPoint = new THREE.Vector2();
        let isAnimating = false;

        function setControlsEnabled(enabled) {
            isAnimating = !enabled;
            // 關鍵修正：不再開關 enabled，而是透過 noRotate 阻止鏡頭轉動，維持事件傾聽不斷線
            if (controls) controls.noRotate = !enabled; 
            scrambleBtn.disabled = !enabled;
            resetBtn.disabled = !enabled;
            undoBtn.disabled = !enabled || moveHistory.length === 0;
            if(resetViewBtn) resetViewBtn.disabled = !enabled;
            if(invertViewBtn) invertViewBtn.disabled = !enabled;
            if(rotateViewBtn) rotateViewBtn.disabled = !enabled;
        }

        function onPointerDown(event) {
            if (isAnimating) return;
            
            // PC: 嚴格限制只有左鍵能選取方塊
            if (event.pointerType === 'mouse' && event.button !== 0) return;
            
            // 手機: 確保只有第一根手指能轉方塊，多指手勢交給 Trackball 處理
            if (event.pointerType === 'touch' && !event.isPrimary) return;

            const gizmoContainer = document.getElementById('gizmo-container');
            if (gizmoContainer && gizmoContainer.contains(event.target)) return;

            // 修正：統一透過 event 讀取座標，不再誤用 touches 陣列
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cubies);
            
            if (intersects.length > 0) {
                selectedCubie = intersects[0].object;
                selectedFaceNormal = intersects[0].face.normal.clone();
                isDragging = true;
                dragStartPoint.set(mouse.x, mouse.y);
                
                // 抓到方塊的瞬間，動態鎖定相機旋轉，這樣滑鼠/手指滑動時就不會拉扯到整顆魔方
                if (controls) controls.noRotate = true; 
            }
        }

        function onPointerMove(event) {
            if (!isDragging || isAnimating) return;
            
            const currentPoint = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
            const dragVector = currentPoint.clone().sub(dragStartPoint);

            if (dragVector.length() > 0.05) {
                isDragging = false;
                const worldNormal = selectedFaceNormal.clone().applyQuaternion(selectedCubie.quaternion).normalize();
                const cameraRight = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 0);
                const cameraUp = new THREE.Vector3().setFromMatrixColumn(camera.matrix, 1);
                const dragDir3D = cameraRight.clone().multiplyScalar(dragVector.x).add(cameraUp.clone().multiplyScalar(dragVector.y));
                const rotationAxis = new THREE.Vector3().crossVectors(worldNormal, dragDir3D).normalize();
                
                let mainAxis = 'x', maxDot = 0;
                ['x', 'y', 'z'].forEach(axis => {
                    const axisVec = new THREE.Vector3(axis === 'x' ? 1 : 0, axis === 'y' ? 1 : 0, axis === 'z' ? 1 : 0);
                    const dot = Math.abs(axisVec.dot(rotationAxis));
                    if (dot > maxDot) { maxDot = dot; mainAxis = axis; }
                });
                const direction = Math.sign(new THREE.Vector3(mainAxis === 'x' ? 1 : 0, mainAxis === 'y' ? 1 : 0, mainAxis === 'z' ? 1 : 0).dot(rotationAxis));
                
                rotateLayer({ pivot: selectedCubie.position.clone(), axis: mainAxis, direction: direction }, true);
            }
        }

        function resetPointerState() {
            // 只要手放開/滑出，且不是在動畫中，就立刻解鎖相機旋轉
            if (controls && !isAnimating) {
                controls.noRotate = false;
            }
            isDragging = false;
            selectedCubie = null;
        }

        // --- 旋轉動畫 ---
        function rotateLayer(move, recordMove = false) {
            return new Promise(resolve => {
                if (recordMove) moveHistory.push(move);
                setControlsEnabled(false); // 這邊會設定 isAnimating = true, noRotate = true
                
                const { pivot: pivotPoint, axis, direction } = move;
                const layer = cubies.filter(c => Math.abs(c.position[axis] - pivotPoint[axis]) < 0.5);
                const pivot = new THREE.Object3D();
                scene.add(pivot);
                layer.forEach(c => pivot.attach(c));
                
                const targetAngle = (Math.PI / 2) * direction;
                const rotationAxisVec = new THREE.Vector3(axis === 'x' ? 1 : 0, axis === 'y' ? 1 : 0, axis === 'z' ? 1 : 0);
                const animationDuration = 300, startTime = performance.now();
                
                const animateRotation = (time) => {
                    const t = Math.min(1, (time - startTime) / animationDuration);
                    const easedT = 1 - Math.pow(1 - t, 3);
                    pivot.setRotationFromAxisAngle(rotationAxisVec, targetAngle * easedT);
                    if (t < 1) {
                        requestAnimationFrame(animateRotation);
                    } else {
                        pivot.setRotationFromAxisAngle(rotationAxisVec, targetAngle);
                        scene.remove(pivot);
                        layer.forEach(c => {
                            const worldPos = new THREE.Vector3(), worldQuat = new THREE.Quaternion();
                            c.getWorldPosition(worldPos);
                            c.getWorldQuaternion(worldQuat);
                            rubiksCube.attach(c);
                            c.position.copy(worldPos).divideScalar(positionOffset).round().multiplyScalar(positionOffset);
                            c.quaternion.copy(worldQuat);
                        });
                        setControlsEnabled(true); // 動畫結束，解除鎖定
                        resolve();
                    }
                };
                requestAnimationFrame(animateRotation);
            });
        }

        // --- 其餘按鈕邏輯 ---
        async function scrambleCube() {
            setControlsEnabled(false);
            moveHistory = []; 
            const axes = ['x', 'y', 'z'], layers = [-1, 0, 1];
            for (let i = 0; i < 25; i++) {
                const axis = axes[Math.floor(Math.random() * 3)];
                const pivotPoint = new THREE.Vector3();
                pivotPoint[axis] = layers[Math.floor(Math.random() * 3)] * positionOffset;
                await rotateLayer({ pivot: pivotPoint, axis: axis, direction: Math.random() < 0.5 ? 1 : -1 }, false);
            }
            setControlsEnabled(true);
        }

        async function undoMove() {
            if (moveHistory.length === 0) return;
            const lastMove = moveHistory.pop();
            await rotateLayer({ pivot: lastMove.pivot, axis: lastMove.axis, direction: -lastMove.direction }, false);
        }

        // --- 事件綁定 ---
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        renderer.domElement.addEventListener('pointermove', onPointerMove);
        renderer.domElement.addEventListener('pointerup', resetPointerState);
        renderer.domElement.addEventListener('pointerleave', resetPointerState);
        renderer.domElement.addEventListener('pointercancel', resetPointerState);

        scrambleBtn.addEventListener('click', scrambleCube);
        resetBtn.addEventListener('click', () => { window.location.reload(); });
        undoBtn.addEventListener('click', undoMove);
        if(resetViewBtn) resetViewBtn.addEventListener('click', () => animateCamera(new THREE.Vector3(4, 4, 6), new THREE.Vector3(0, 1, 0)));
        if(invertViewBtn) invertViewBtn.addEventListener('click', () => animateCamera(camera.position.clone(), camera.up.clone().negate()));
        if(rotateViewBtn) {
            rotateViewBtn.addEventListener('click', () => {
                const lookDir = new THREE.Vector3(); camera.getWorldDirection(lookDir);
                animateCamera(camera.position.clone(), camera.up.clone().applyQuaternion(new THREE.Quaternion().setFromAxisAngle(lookDir, -Math.PI / 2)));
            });
        }

        // --- 渲染迴圈 ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            insideMaterial.uniforms.u_time.value = clock.getElapsedTime();
            if (controls) controls.update(); 
            if (gizmoRenderer) {
                gizmo.quaternion.copy(camera.quaternion).invert();
                gizmoRenderer.render(gizmoScene, gizmoCamera);
                labelRenderer.render(gizmoScene, gizmoCamera);
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (controls) controls.handleResize();
            if (gizmoRenderer) {
                const container = document.getElementById('gizmo-container');
                gizmoCamera.aspect = container.clientWidth / container.clientHeight;
                gizmoCamera.updateProjectionMatrix();
                gizmoRenderer.setSize(container.clientWidth, container.clientHeight);
                labelRenderer.setSize(container.clientWidth, container.clientHeight);
            }
        });

        setControlsEnabled(true);
        initGizmo();
        animate();
        if (document.getElementById('copyright-year')) document.getElementById('copyright-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
