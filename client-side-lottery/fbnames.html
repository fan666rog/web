<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FB 留言萃取器 V1.6 (視覺防樓中樓版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { margin-bottom: 20px; }
        
        .control-panel {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .option-group { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; color: #444; cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        button.run-btn {
            padding: 12px 24px; font-size: 18px; font-weight: bold; cursor: pointer;
            background-color: #008CBA; color: white; border: none; border-radius: 5px; transition: background-color 0.2s;
        }
        button.run-btn:hover { background-color: #007399; }

        .stats-panel {
            background-color: #eef7e8; border-left: 5px solid #4CAF50; padding: 15px;
            border-radius: 4px; margin-bottom: 20px; font-size: 15px; line-height: 1.6; display: none;
        }
        .stats-panel span.highlight { font-weight: bold; color: #d9534f; }
        .stats-panel span.success { font-weight: bold; color: #2b542c; }

        .container { display: flex; gap: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        .title { font-weight: bold; margin-bottom: 10px; font-size: 16px; color: #444; }
        
        #inputArea { height: 500px; border: 2px dashed #aaa; padding: 15px; overflow-y: auto; background-color: #fff; border-radius: 8px; position: relative; }
        #outputArea { height: 500px; border: 2px solid #555; padding: 15px; resize: none; font-size: 16px; line-height: 1.5; border-radius: 8px; background-color: #fff; }
    </style>
</head>
<body>

    <h2>FB 留言名單萃取器 (視覺防樓中樓版)</h2>

    <div class="control-panel">
        <button class="run-btn" onclick="extractNames()">⚡ 整理名單</button>
        <label class="option-group">
            <input type="checkbox" id="excludeAuthorCheck" checked>
            自動排除作者留言
        </label>
    </div>

    <div id="statsPanel" class="stats-panel">
        <div>📌 抓取到主留言人次： <span id="statParsed" class="success">0</span> 次</div>
        <div>✅ 最終乾淨名單產出： <span id="statOutput" class="success">0</span> 位</div>
        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 10px 0;">
        <div>🗑️ 排除同人重複留言： <span id="statDuplicates">無</span></div>
        <div>⚠️ 偵測同名不同人 (已標記)： <span id="statSameName">無</span></div>
    </div>

    <div class="container">
        <div class="box">
            <div class="title">1. 在下方點擊並貼上 FB 留言 (Ctrl+V)</div>
            <div id="inputArea" contenteditable="true"></div>
        </div>
        <div class="box">
            <div class="title">2. 乾淨名單輸出區</div>
            <textarea id="outputArea" readonly placeholder="萃取後的名字會出現在這裡..."></textarea>
        </div>
    </div>

    <script>
        function extractUserId(href) {
            if (!href) return "unknown";
            try {
                let urlObj = new URL(href);
                if (urlObj.pathname.includes('/profile.php')) return urlObj.searchParams.get('id') || "unknown";
                let pathSegments = urlObj.pathname.split('/').filter(p => p !== "");
                if (pathSegments.length > 0) return pathSegments[0];
                return "unknown";
            } catch (e) { return "unknown"; }
        }

        function extractNames() {
            const inputArea = document.getElementById('inputArea');
            const outputArea = document.getElementById('outputArea');
            const statsPanel = document.getElementById('statsPanel');
            const excludeAuthorCheck = document.getElementById('excludeAuthorCheck').checked;
            
            // --- 抓取作者名稱 ---
            let authorName = "";
            const lines = inputArea.innerText.split('\n').map(line => line.trim());
            for (let i = 0; i < lines.length; i++) {
                if (lines[i] === "作者") {
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j] !== "") { authorName = lines[j]; break; }
                    }
                    break; 
                }
            }

            const links = Array.from(inputArea.querySelectorAll('a'));
            
            // --- 新增：測量主留言的「X 座標基準線」 ---
            let minLeftX = Infinity;
            // 先掃描一次，找出最靠左的座標
            links.forEach(link => {
                let rect = link.getBoundingClientRect();
                // 排除一些隱藏的空連結
                if (rect.width > 0 && rect.left < minLeftX) {
                    minLeftX = rect.left;
                }
            });
            // 設定一個容錯值 (大於基準線 20px 以上的就視為縮排/樓中樓)
            const indentThreshold = minLeftX + 20;


            let userMap = new Map(); 
            let totalParsedCount = 0;
            let duplicateExclusions = new Set();
            let sameNameDifferentPeople = new Set();
            let isLookingForCommenter = true; 

            const blacklist = ["讚", "回覆", "分享", "檢舉", "隱藏", "查看更多", "追蹤", "發送訊息", "頭號粉絲", "編輯記錄", "作者", "已編輯"];

            links.forEach(link => {
                // --- 新增：視覺縮排過濾法 ---
                let rect = link.getBoundingClientRect();
                // 如果這個元素的 X 座標明顯偏右，代表它是樓中樓，直接略過不處理！
                if (rect.left > indentThreshold) {
                    return; 
                }

                let text = link.innerText.trim();
                let href = link.getAttribute('href') || ""; 
                
                const isTimeFormat = /^\d+\s*(天|小時|分鐘|秒|週|年)(前)?$/.test(text) || text === "剛剛" || text === "昨天" || /^\d+月\d+日$/.test(text) || /^\d{4}年\d+月\d+日$/.test(text) || /^\d+ 週$/.test(text);

                if (isTimeFormat || text === "回覆" || text === "讚") {
                    isLookingForCommenter = true; 
                    return; 
                }

                const isURLText = text.startsWith("http") || text.startsWith("www.");
                const isPostOrExternalLink = href.includes('/share/p/') || href.includes('/posts/') || href.includes('/groups/') || (href.startsWith('http') && !href.includes('facebook.com'));
                const isAuthor = excludeAuthorCheck && (text === authorName);

                if (text === "" || blacklist.includes(text) || !isNaN(text) || isURLText || isPostOrExternalLink) {
                    return; 
                }

                if (isLookingForCommenter) {
                    if (!isAuthor) {
                        let userId = extractUserId(href);
                        totalParsedCount++;

                        if (userMap.has(text)) {
                            let existingIds = userMap.get(text);
                            if (existingIds.has(userId)) {
                                duplicateExclusions.add(text);
                            } else {
                                existingIds.add(userId);
                                sameNameDifferentPeople.add(text);
                            }
                        } else {
                            userMap.set(text, new Set([userId]));
                        }
                    }
                    isLookingForCommenter = false; 
                }
            });

            let finalNamesArray = [];
            userMap.forEach((idsSet, name) => {
                if (idsSet.size === 1) finalNamesArray.push(name);
                else idsSet.forEach(id => finalNamesArray.push(`${name} (@${id})`));
            });

            outputArea.value = finalNamesArray.join('\n');
            document.getElementById('statParsed').innerText = totalParsedCount;
            document.getElementById('statOutput').innerText = finalNamesArray.length;
            document.getElementById('statDuplicates').innerHTML = duplicateExclusions.size > 0 ? `<span class="highlight">${Array.from(duplicateExclusions).join(', ')}</span>` : "無";
            document.getElementById('statSameName').innerHTML = sameNameDifferentPeople.size > 0 ? `<span class="highlight">${Array.from(sameNameDifferentPeople).join(', ')}</span>` : "無";
            statsPanel.style.display = "block"; 
        }
    </script>
</body>
</html>
