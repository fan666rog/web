<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FB 留言萃取器 V2.0</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { margin-bottom: 20px; }
        
        .control-panel {
            background-color: #fff; padding: 20px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        .main-action { margin-bottom: 20px; }

        .settings-panel {
            background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 6px; padding: 15px 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .setting-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        
        .divider { width: 100%; height: 1px; background-color: #ddd; margin: 5px 0; }

        .option-group { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: bold; color: #444; cursor: pointer; min-width: 150px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .tooltip {
            position: relative; display: inline-flex; justify-content: center; align-items: center;
            width: 18px; height: 18px; background-color: #aaa; color: white;
            border-radius: 50%; font-size: 12px; font-weight: bold; cursor: help; outline: none;
        }
        .tooltip:hover, .tooltip:focus { background-color: #666; }
        .tooltip .tooltip-text {
            visibility: hidden; width: 280px; background-color: #444; color: #fff;
            text-align: left; border-radius: 6px; padding: 10px 14px; font-size: 13px;
            position: absolute; z-index: 10; bottom: 140%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.3s; font-weight: normal; line-height: 1.5;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); pointer-events: none;
        }
        .tooltip .tooltip-text::after {
            content: ""; position: absolute; top: 100%; left: 50%; margin-left: -5px;
            border-width: 5px; border-style: solid; border-color: #444 transparent transparent transparent;
        }
        .tooltip:hover .tooltip-text, .tooltip:focus .tooltip-text { visibility: visible; opacity: 1; }

        .input-box { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .input-box:disabled { background-color: #e9ecef; color: #999; cursor: not-allowed; border-color: #ddd; }

        button.run-btn {
            padding: 12px 40px; font-size: 18px; font-weight: bold; cursor: pointer;
            background-color: #008CBA; color: white; border: none; border-radius: 5px; transition: background-color 0.2s;
        }
        button.run-btn:hover { background-color: #007399; }

        .stats-panel {
            background-color: #eef7e8; border-left: 5px solid #4CAF50; padding: 15px;
            border-radius: 4px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; display: none;
        }
        .stats-panel span.highlight { font-weight: bold; color: #d9534f; }
        .stats-panel span.success { font-weight: bold; color: #2b542c; }

        .container { display: flex; gap: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        .title { font-weight: bold; margin-bottom: 10px; font-size: 16px; color: #444; }
        
        #inputArea { height: 500px; border: 2px dashed #aaa; padding: 15px; overflow-y: auto; background-color: #fff; border-radius: 8px; }
        #outputArea { height: 500px; border: 2px solid #555; padding: 15px; resize: none; font-size: 16px; line-height: 1.5; border-radius: 8px; background-color: #fff; }
    </style>
</head>
<body>

    <h2>FB 留言名單萃取器 V2.0</h2>

    <div class="control-panel">
        <div class="main-action">
            <button class="run-btn" onclick="extractNames()">⚡ 開始資格審核</button>
        </div>

        <div class="settings-panel">
            <div class="setting-row">
                <label class="option-group">
                    <input type="checkbox" id="excludeAuthorCheck" checked> 自動排除「作者」
                    <span class="tooltip" tabindex="0">?
                        <span class="tooltip-text">程式依賴「作者」標籤辨識。若偵測失敗請使用手動排除。</span>
                    </span>
                </label>
            </div>

            <div class="setting-row">
                <label class="option-group">
                    <input type="checkbox" id="keywordEnable" onchange="handleKeywordChange()"> 啟用通關密語
                    <span class="tooltip" tabindex="0">?
                        <span class="tooltip-text">若大量留言『完全相同』的字串，極易遭 FB 演算法判定為洗版而降流。建議在活動規則中引導粉絲留言『通關密語 + 個人心得/創意』，以保護粉專觸及率。</span>
                    </span>
                </label>
                <input type="text" id="keywordInput" class="input-box" disabled placeholder="支援多組字串，請用「逗號」隔開" style="width: 250px;">
            </div>

            <div class="setting-row">
                <label class="option-group">
                    <input type="checkbox" id="tagEnable" onchange="handleTagChange()"> 啟用標記朋友
                    <span class="tooltip" tabindex="0">?
                        <span class="tooltip-text">若留言過度要求標記朋友易被 FB 系統判定為『互動誘餌』，可能導致貼文觸及率被大幅降低，請謹慎評估使用。勾選此項將同步啟用通關密語。</span>
                    </span>
                </label>
                <span style="font-size: 15px; color: #444;">至少標記 <input type="number" id="tagCountInput" class="input-box" value="1" min="1" step="1" disabled style="width: 60px; text-align: center; margin: 0 5px;"> 人</span>
            </div>

            <div class="divider"></div>

            <div class="setting-row">
                <span style="font-weight: bold; color: #444; min-width: 100px;">🚫 手動排除：</span>
                <input type="text" id="manualExclusions" class="input-box" style="flex-grow:1;" placeholder="排除特定人名，請用「逗號」或「分號」隔開">
            </div>
        </div>
    </div>

    <div id="statsPanel" class="stats-panel">
        <div class="setting-row" style="gap:30px;">
            <div>📌 掃描留言總數： <span id="statParsed" class="success">0</span></div>
            <div>✅ 資格合格人數： <span id="statOutput" class="success">0</span></div>
        </div>
        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 10px 0;">
        <div>🗑️ 排除名單： <span id="statDuplicates">無</span></div>
        <div>❌ 不符資格： <span id="statFail">無</span></div>
        <div>⚠️ 同名不同人： <span id="statSameName">無</span></div>
    </div>

    <div class="container">
        <div class="box">
            <div class="title">1. 在下方貼上 FB 留言 (Ctrl+V)</div>
            <div id="inputArea" contenteditable="true"></div>
        </div>
        <div class="box">
            <div class="title">2. 合格名單輸出區</div>
            <textarea id="outputArea" readonly placeholder="審核後的名字會出現在這裡..."></textarea>
        </div>
    </div>

    <script>
        function handleKeywordChange() {
            const isEnabled = document.getElementById('keywordEnable').checked;
            const input = document.getElementById('keywordInput');
            input.disabled = !isEnabled;
            
            if (!isEnabled) {
                input.value = '';
                const tagCheck = document.getElementById('tagEnable');
                if (tagCheck.checked) {
                    tagCheck.checked = false;
                    const tagInput = document.getElementById('tagCountInput');
                    tagInput.disabled = true;
                    tagInput.value = 1;
                }
            }
        }

        function handleTagChange() {
            const isEnabled = document.getElementById('tagEnable').checked;
            const input = document.getElementById('tagCountInput');
            input.disabled = !isEnabled;
            
            if (!isEnabled) {
                input.value = 1;
            } else {
                const keywordCheck = document.getElementById('keywordEnable');
                if (!keywordCheck.checked) {
                    keywordCheck.checked = true;
                    document.getElementById('keywordInput').disabled = false;
                }
            }
        }

        function extractUserId(href) {
            if (!href) return "unknown";
            try {
                let urlObj = new URL(href);
                if (urlObj.pathname.includes('/profile.php')) return urlObj.searchParams.get('id') || "unknown";
                if (urlObj.pathname.includes('/groups/') && urlObj.pathname.includes('/user/')) {
                    let segments = urlObj.pathname.split('/').filter(p => p !== "");
                    let userIdx = segments.indexOf('user');
                    if (userIdx !== -1 && segments.length > userIdx + 1) return segments[userIdx + 1];
                }
                let pathSegments = urlObj.pathname.split('/').filter(p => p !== "");
                if (pathSegments.length > 0 && !pathSegments[0].includes("groups")) return pathSegments[0];
                return "unknown";
            } catch (e) { return "unknown"; }
        }

        function extractNames() {
            const keywordActive = document.getElementById('keywordEnable').checked;
            const keywordInputDom = document.getElementById('keywordInput');
            const rawKeywords = keywordInputDom.value.trim();
            const tagActive = document.getElementById('tagEnable').checked;
            const tagInputDom = document.getElementById('tagCountInput');
            
            // 🌟 核心防呆更新：先讀取字串轉為浮點數，檢查是否有小數點
            const rawTagString = tagInputDom.value;
            const rawTagFloat = parseFloat(rawTagString);

            if (keywordActive && rawKeywords === "") {
                alert("⚠️ 錯誤：您已勾選「啟用通關密語」，請輸入指定的字串！");
                keywordInputDom.focus();
                return;
            }

            // 🌟 防呆：不只是小於1，還必須是完整的整數，不能有小數點
            if (tagActive) {
                if (rawTagString === "" || isNaN(rawTagFloat) || rawTagFloat < 1 || !Number.isInteger(rawTagFloat)) {
                    alert("⚠️ 錯誤：您已勾選「啟用標記朋友」，請輸入大於或等於 1 的「正整數」！");
                    tagInputDom.focus();
                    return;
                }
            }

            const inputArea = document.getElementById('inputArea');
            const outputArea = document.getElementById('outputArea');
            const statsPanel = document.getElementById('statsPanel');
            
            const excludeAuthorActive = document.getElementById('excludeAuthorCheck').checked;
            const keywordArray = rawKeywords.split(/[，,；;]+/).map(k => k.replace(/\s+/g, '').toLowerCase()).filter(k => k !== "");
            const minTags = parseInt(rawTagString); // 通過上面的嚴格驗證後，這裡安心轉換
            
            const manualList = document.getElementById('manualExclusions').value.split(/[，,；;]+/).map(n => n.trim()).filter(n => n !== "");

            let detectedAuthors = new Set();
            const lines = inputArea.innerText.split('\n').map(line => line.trim());
            for (let i = 0; i < lines.length; i++) {
                if (lines[i] === "作者") {
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j] !== "") { detectedAuthors.add(lines[j]); break; }
                    }
                }
            }

            const links = Array.from(inputArea.querySelectorAll('a'));
            let minLeftX = Infinity;
            links.forEach(link => {
                let rect = link.getBoundingClientRect();
                if (rect.width > 0 && rect.left > 0 && rect.left < minLeftX) minLeftX = rect.left;
            });
            const indentThreshold = minLeftX + 20;

            let userMap = new Map(); 
            let totalParsedCount = 0;
            let excludedLog = new Set();
            let disqualifiedLog = new Set();
            let sameNameLog = new Set();

            const blacklist = ["讚", "回覆", "分享", "檢舉", "隱藏", "查看更多", "追蹤", "發送訊息", "頭號粉絲", "編輯記錄", "作者", "已編輯"];

            let currentCase = null;
            let isLookingForCommenter = true; 

            const walker = document.createTreeWalker(inputArea, NodeFilter.SHOW_ELEMENT | NodeFilter.SHOW_TEXT, null, false);
            let currentNode;
            
            while (currentNode = walker.nextNode()) {
                if (currentNode.nodeType === Node.ELEMENT_NODE && currentNode.tagName === "A") {
                    let text = currentNode.textContent.trim();
                    let rect = currentNode.getBoundingClientRect();
                    let href = currentNode.getAttribute('href') || "";

                    const isTimeFormat = /^\d+\s*(天|小時|分鐘|秒|週|年)(前)?$/.test(text) || text === "剛剛" || text === "昨天" || /^\d+月\d+日$/.test(text) || /^\d{4}年\d+月\d+日$/.test(text) || /^\d+ 週$/.test(text);
                    
                    if (isTimeFormat || text.includes("回覆") || text === "讚") {
                        isLookingForCommenter = true;
                        if (currentCase) {
                            finalizeCase(currentCase);
                            currentCase = null;
                        }
                        continue;
                    }

                    if (rect.width === 0) continue;

                    if (isLookingForCommenter) {
                        if (rect.left <= indentThreshold && !blacklist.includes(text) && !text.startsWith("http") && isNaN(text)) {
                            currentCase = {
                                name: text,
                                userId: extractUserId(href),
                                content: "",
                                tags: new Set(),
                                isAuthor: excludeAuthorActive && detectedAuthors.has(text),
                                isManual: manualList.includes(text)
                            };
                            isLookingForCommenter = false;
                        }
                    } else {
                        if (currentCase && text !== "" && !blacklist.includes(text)) {
                            const isHashtag = text.startsWith("#") || href.includes("/hashtag/");
                            const isPost = href.includes("/posts/") || href.includes("/share/");
                            const isExternal = href.includes("l.facebook.com") || (!href.includes("facebook.com") && href.startsWith("http"));
                            const targetId = extractUserId(href);

                            if (!isHashtag && !isPost && !isExternal && targetId !== "unknown" && targetId !== currentCase.userId) {
                                currentCase.tags.add(targetId);
                            }
                        }
                    }

                } else if (currentNode.nodeType === Node.TEXT_NODE) {
                    if (currentCase && !isLookingForCommenter) {
                        if (currentNode.parentElement && !currentNode.parentElement.closest('a')) {
                            currentCase.content += currentNode.nodeValue;
                        }
                    }
                }
            }

            if (currentCase) finalizeCase(currentCase);

            function finalizeCase(c) {
                totalParsedCount++;
                
                if (c.isAuthor || c.isManual) {
                    excludedLog.add(c.name);
                    return;
                }

                if (keywordActive && keywordArray.length > 0) {
                    const cleanContent = c.content.replace(/\s+/g, '').toLowerCase();
                    const isMatch = keywordArray.some(kw => cleanContent.includes(kw));
                    if (!isMatch) {
                        disqualifiedLog.add(c.name + " (密語錯誤)");
                        return;
                    }
                }

                if (tagActive && c.tags.size < minTags) {
                    disqualifiedLog.add(c.name + " (標記不足)");
                    return;
                }

                if (userMap.has(c.name)) {
                    let ids = userMap.get(c.name);
                    if (ids.has(c.userId)) {
                        excludedLog.add(c.name);
                    } else {
                        ids.add(c.userId);
                        sameNameLog.add(c.name);
                    }
                } else {
                    userMap.set(c.name, new Set([c.userId]));
                }
            }

            let finalNames = [];
            userMap.forEach((ids, name) => {
                if (ids.size === 1) finalNames.push(name);
                else ids.forEach(id => finalNames.push(`${name} (@${id})`));
            });

            outputArea.value = finalNames.join('\n');
            
            document.getElementById('statParsed').innerText = totalParsedCount;
            document.getElementById('statOutput').innerText = finalNames.length;
            document.getElementById('statDuplicates').innerHTML = excludedLog.size > 0 ? `<span class="highlight">${Array.from(excludedLog).join(', ')}</span>` : "無";
            document.getElementById('statFail').innerHTML = disqualifiedLog.size > 0 ? `<span class="highlight">${Array.from(disqualifiedLog).join(', ')}</span>` : "無";
            document.getElementById('statSameName').innerHTML = sameNameLog.size > 0 ? `<span class="highlight">${Array.from(sameNameLog).join(', ')}</span>` : "無";
            statsPanel.style.display = "block";
        }
    </script>
</body>
</html>
