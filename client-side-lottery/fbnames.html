<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>FB 留言萃取器 V1.5 (智慧辨識版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        h2 { margin-bottom: 20px; }
        
        /* 控制面板區塊 */
        .control-panel {
            background-color: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: bold;
            color: #444;
            cursor: pointer;
        }

        button.run-btn {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        button.run-btn:hover { background-color: #007399; }

        /* 處理結果顯示區 (儀表板) */
        .stats-panel {
            background-color: #eef7e8;
            border-left: 5px solid #4CAF50;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 15px;
            line-height: 1.6;
            display: none; /* 初始隱藏，執行後顯示 */
        }
        .stats-panel span.highlight { font-weight: bold; color: #d9534f; }
        .stats-panel span.success { font-weight: bold; color: #2b542c; }

        /* 左右輸入輸出區塊 */
        .container { display: flex; gap: 20px; }
        .box { flex: 1; display: flex; flex-direction: column; }
        .title { font-weight: bold; margin-bottom: 10px; font-size: 16px; color: #444; }
        
        #inputArea {
            height: 500px;
            border: 2px dashed #aaa;
            padding: 15px;
            overflow-y: auto;
            background-color: #fff;
            border-radius: 8px;
        }
        
        #outputArea {
            height: 500px;
            border: 2px solid #555;
            padding: 15px;
            resize: none;
            font-size: 16px;
            line-height: 1.5;
            border-radius: 8px;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <h2>FB 留言名單萃取器 (智慧辨識版)</h2>

    <div class="control-panel">
        <button class="run-btn" onclick="extractNames()">⚡ 整理名單</button>
        <label class="option-group">
            <input type="checkbox" id="excludeAuthorCheck" checked>
            自動排除作者留言
        </label>
    </div>

    <div id="statsPanel" class="stats-panel">
        <div>📌 抓取到有效留言人次： <span id="statParsed" class="success">0</span> 次</div>
        <div>✅ 最終乾淨名單產出： <span id="statOutput" class="success">0</span> 位</div>
        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 10px 0;">
        <div>🗑️ 排除同人重複留言： <span id="statDuplicates">無</span></div>
        <div>⚠️ 偵測同名不同人 (已標記)： <span id="statSameName">無</span></div>
    </div>

    <div class="container">
        <div class="box">
            <div class="title">1. 在下方點擊並貼上 FB 留言 (Ctrl+V)</div>
            <div id="inputArea" contenteditable="true"></div>
        </div>
        <div class="box">
            <div class="title">2. 乾淨名單輸出區</div>
            <textarea id="outputArea" readonly placeholder="萃取後的名字會出現在這裡..."></textarea>
        </div>
    </div>

    <script>
        // 輔助函數：從網址中萃取出乾淨的 ID 或帳號名稱
        function extractUserId(href) {
            if (!href) return "unknown";
            try {
                let urlObj = new URL(href);
                // 處理 profile.php?id=12345678 格式
                if (urlObj.pathname.includes('/profile.php')) {
                    return urlObj.searchParams.get('id') || "unknown";
                }
                // 處理 facebook.com/username 格式
                let pathSegments = urlObj.pathname.split('/').filter(p => p !== "");
                if (pathSegments.length > 0) {
                    return pathSegments[0]; // 第一個路徑通常就是帳號名稱
                }
                return "unknown";
            } catch (e) {
                return "unknown"; // 容錯處理
            }
        }

        function extractNames() {
            const inputArea = document.getElementById('inputArea');
            const outputArea = document.getElementById('outputArea');
            const statsPanel = document.getElementById('statsPanel');
            const excludeAuthorCheck = document.getElementById('excludeAuthorCheck').checked;
            
            // --- 抓取作者名稱 ---
            let authorName = "";
            const lines = inputArea.innerText.split('\n').map(line => line.trim());
            for (let i = 0; i < lines.length; i++) {
                if (lines[i] === "作者") {
                    for (let j = i + 1; j < lines.length; j++) {
                        if (lines[j] !== "") {
                            authorName = lines[j];
                            break;
                        }
                    }
                    break; 
                }
            }

            const links = inputArea.querySelectorAll('a');
            
            // --- 資料結構大升級：改用 Map 來記錄 [人名 -> Set(網址ID)] ---
            let userMap = new Map(); 
            
            // 統計用變數
            let totalParsedCount = 0;
            let duplicateExclusions = new Set();
            let sameNameDifferentPeople = new Set();

            let isLookingForCommenter = true; 

            const blacklist = [
                "讚", "回覆", "分享", "檢舉", "隱藏", "查看更多", 
                "追蹤", "發送訊息", "頭號粉絲", "編輯記錄", "作者", "已編輯"
            ];

            // --- 開始掃描 DOM ---
            links.forEach(link => {
                let text = link.innerText.trim();
                let href = link.getAttribute('href') || ""; 
                
                const isTimeFormat = /^\d+\s*(天|小時|分鐘|秒|週|年)(前)?$/.test(text) || 
                                     text === "剛剛" || text === "昨天" ||
                                     /^\d+月\d+日$/.test(text) || /^\d{4}年\d+月\d+日$/.test(text) || /^\d+ 週$/.test(text);

                // 遇到時間或回覆按鈕，重啟開關
                if (isTimeFormat || text === "回覆" || text === "讚") {
                    isLookingForCommenter = true; 
                    return; 
                }

                const isURLText = text.startsWith("http") || text.startsWith("www.");
                const isPostOrExternalLink = href.includes('/share/p/') || 
                                             href.includes('/posts/') || 
                                             href.includes('/groups/') ||
                                             (href.startsWith('http') && !href.includes('facebook.com'));
                const isAuthor = excludeAuthorCheck && (text === authorName);

                // 雜訊過濾
                if (text === "" || blacklist.includes(text) || !isNaN(text) || isURLText || isPostOrExternalLink) {
                    return; 
                }

                // 判定為留言者
                if (isLookingForCommenter) {
                    if (!isAuthor) {
                        let userId = extractUserId(href);
                        totalParsedCount++;

                        // --- 核心邏輯：同名與同人判斷 ---
                        if (userMap.has(text)) {
                            let existingIds = userMap.get(text);
                            if (existingIds.has(userId)) {
                                // 狀況 A：同名且同 ID -> 同一個人重複留言，排除！
                                duplicateExclusions.add(text);
                            } else {
                                // 狀況 B：同名但不同 ID -> 發現同名不同人！
                                existingIds.add(userId);
                                sameNameDifferentPeople.add(text);
                            }
                        } else {
                            // 第一次遇到的名字
                            userMap.set(text, new Set([userId]));
                        }
                    }
                    isLookingForCommenter = false; // 關閉開關，無視留言內的 tag
                }
            });

            // --- 產生最終輸出名單 ---
            let finalNamesArray = [];
            
            userMap.forEach((idsSet, name) => {
                if (idsSet.size === 1) {
                    // 只有一個 ID，代表沒有同名不同人的狀況，乾淨印出名字
                    finalNamesArray.push(name);
                } else {
                    // 有多個 ID，代表發生同名狀況，幫他們各自加上專屬帳號後綴
                    idsSet.forEach(id => {
                        finalNamesArray.push(`${name} (@${id})`);
                    });
                }
            });

            // 輸出至畫面
            outputArea.value = finalNamesArray.join('\n');

            // --- 更新儀表板資料 ---
            document.getElementById('statParsed').innerText = totalParsedCount;
            document.getElementById('statOutput').innerText = finalNamesArray.length;
            
            document.getElementById('statDuplicates').innerHTML = duplicateExclusions.size > 0 
                ? `<span class="highlight">${Array.from(duplicateExclusions).join(', ')}</span>` 
                : "無";
                
            document.getElementById('statSameName').innerHTML = sameNameDifferentPeople.size > 0 
                ? `<span class="highlight">${Array.from(sameNameDifferentPeople).join(', ')}</span>` 
                : "無";

            statsPanel.style.display = "block"; // 顯示儀表板
        }
    </script>
</body>
</html>
